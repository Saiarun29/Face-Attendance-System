<!DOCTYPE html>
<html>
<head>
    <title>ProAttend</title>

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;

            /* ✅ FIXED BACKGROUND */
            background: url("{{ url_for('static', filename='bg.png') }}") no-repeat center center/cover;
            height: 100vh;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* 🔹 Logo top-left */
        .logo {
            position: absolute;
            top: 20px;
            left: 150px;
            z-index: 2;
        }

        .logo img {
            height: 110px;
        }

        /* 🔹 Title */
        .main-title {
            position: absolute;
            top: 150px;
            width: 80%;
            text-align: center;
            color: white;
            z-index: 1;
        }

        .main-title h1 {
            font-size: 38px;
            margin: 0;
        }

        .main-title p {
            color: #ccc;
            margin-top: 8px;
        }

        /* 🔹 Center container */
        .container {
            position: relative;
            z-index: 1;

            display: flex;
            align-items: center;
            justify-content: flex-start;   /* ⬅️ move left */

            height: 120vh;
            padding-left: 25%;              /* ⬅️ control distance from left */
        }

        /* 🔹 Glass card */
        .login-box {
            width: 400px;
            padding: 30px;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            color: white;

            animation: fadeIn 0.8s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 🔹 Input with icons */
        .input-group {
            position: relative;
            margin: 14px 0;
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 40px;
            box-sizing: border-box;   /* 🔥 IMPORTANT FIX */
        }
        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(30,144,255,0.7);
        }
        .toggle-password:hover {
            color: #1e90ff;
        }
        /* Left icon */
        .input-group i.fa-user,
        .input-group i.fa-lock {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: gray;
        }

        /* Eye icon */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: gray;
        }

        /* 🔹 Button */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 18px;
            border-radius: 8px;
            border: none;

            background: linear-gradient(90deg, #1e90ff, #0056b3);
            color: white;
            font-size: 16px;
            font-weight: 600;

            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(30,144,255,0.6);
        }

        /* Flash messages */
        .flash {
            color: #ff8080;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<!-- ✅ Logo -->
<div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="ProAttend">
</div>

<!-- ✅ Title -->
<div class="main-title">
    <h1>Smart Attendance System</h1>
    <p>Automated | Accurate | Intelligent</p>
</div>

<!-- ✅ Login -->
<div class="container">
    <div class="login-box">

        <h2>Teacher Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash">
              {% for msg in messages %}
                <p>{{ msg }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">

            <!-- Username -->
            <div class="input-group">
                <i class="fa fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <!-- Password -->
            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword()">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <button type="submit">Login</button>

        </form>

    </div>
</div>

<!-- JS -->
<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = (pwd.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
