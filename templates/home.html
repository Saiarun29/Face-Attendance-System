<!DOCTYPE html>
<html>
<head>
    <title>Control Panel - ProAttend</title>

    <link rel="icon" href="{{ url_for('static', filename='icon.png') }}">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;

            background: url("{{ url_for('static', filename='bg.png') }}") no-repeat center center/cover;
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 0;
        }

        /* Topbar */
        .topbar {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .topbar img {
            height: 60px;
        }

        .logout {
            background: #ff3b3b;
            padding: 10px 18px;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .logout:hover {
            background: #d92c2c;
        }

        /* Title */
        .header {
            text-align: center;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 34px;
            margin: 0;
        }

        .header p {
            color: #bbb;
            margin-top: 8px;
        }

        /* Main layout */
        .main {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 70px;
        }

        /* Card */
        .card {
            width: 260px;
            padding: 30px;
            border-radius: 14px;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);

            text-align: center;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        .card h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        /* Inputs */
        .card input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-bottom: 15px;
            outline: none;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(90deg, #1e90ff, #0056b3);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(30,144,255,0.6);
        }

        /* Dashboard button */
        .dashboard-btn {
            text-align: center;
            margin-top: 60px;
            position: relative;
            z-index: 1;
        }

        .dashboard-btn button {
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #28a745, #1e7e34);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .dashboard-btn button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(40,167,69,0.6);
        }

    </style>
</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <img src="{{ url_for('static', filename='logo.png') }}">
    <a href="/logout"><button class="logout">Logout</button></a>
</div>

<!-- Header -->
<div class="header">
    <h1>Control Panel</h1>
    <p>Manage Attendance System Efficiently</p>
</div>

<!-- Cards -->
<div class="main">

    <!-- Register -->
    <div class="card">
        <h3>Register Student</h3>
        <form action="/register" method="POST">
            <input type="text" name="name" placeholder="Enter Name" required>
            <button class="btn" type="submit">Register</button>
        </form>
    </div>

    <!-- Train -->
    <div class="card">
        <h3>Train Model</h3>
        <a href="/train"><button class="btn">Train</button></a>
    </div>

    <!-- Start -->
    <div class="card">
        <h3>Start Attendance</h3>
        <a href="/start"><button class="btn">Start</button></a>
    </div>

</div>

<!-- Dashboard -->
<div class="dashboard-btn">
    <a href="/dashboard">
        <button>View Dashboard</button>
    </a>
</div>

</body>
</html>
